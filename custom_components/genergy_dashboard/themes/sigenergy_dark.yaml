      primary-text-color: '#ffffff'
      rgb-primary-color: 0,212,184
      secondary-background-color: '#22273a'
      secondary-text-color: '#8892a4'
      sidebar-background-color: '#151928'
      sidebar-icon-color: '#8892a4'
